name: AI 인텔 일일 수집 + 블로그 자동 배포

on:
  schedule:
    # 매일 오전 8시 KST (= UTC 23:00 전날)
    - cron: "0 23 * * *"
  workflow_dispatch:
    # GitHub 웹에서 수동 실행 버튼도 활성화

jobs:
  collect-intel:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 인텔 수집기 실행
        run: python .harness/intel_collector.py

      - name: 생성된 보고서를 저장소에 커밋
        run: |
          git config user.name  "KNOT Intel Bot"
          git config user.email "bot@ai-frontier"
          git add 01_inbox/
          git diff --cached --quiet || git commit -m "🤖 Daily Intel: $(date +'%Y-%m-%d')"
          git push
