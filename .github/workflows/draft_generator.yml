name: 블로그 초안 자동 생성

on:
  # 인텔 수집 워크플로우 완료 후 자동 실행
  workflow_run:
    workflows: ["AI 인텔 일일 수집 + 블로그 자동 배포"]
    types: [completed]
  # 수동 실행도 가능
  workflow_dispatch:
    inputs:
      topic:
        description: '초안 생성 토픽 (anthropic / karpathy / news)'
        required: false
        default: 'anthropic'

jobs:
  generate-draft:
    runs-on: ubuntu-latest
    # 인텔 수집이 성공한 경우에만 실행
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: anthropic 패키지 설치
        run: pip install anthropic

      - name: 블로그 초안 생성
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          TOPIC="${{ github.event.inputs.topic || 'anthropic' }}"
          python -c "
          import sys, os
          sys.path.insert(0, '.harness')
          os.chdir('.')
          from main import HarnessOrchestrator
          o = HarnessOrchestrator(vault_path='.')
          result = o.execute_workflow('GENERATE_DRAFT', '$TOPIC')
          print('DRAFT_PATH=' + str(result))
          "

      - name: 생성된 초안으로 PR 생성
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +'%Y-%m-%d')
          BRANCH="draft/${DATE}-auto"

          git config user.name  "KNOT Draft Bot"
          git config user.email "bot@ai-frontier"

          # 변경사항 있을 때만 PR 생성
          if git diff --quiet && git diff --staged --quiet; then
            echo "생성된 초안 없음 — 종료"
            exit 0
          fi

          git checkout -b "$BRANCH"
          git add blog/drafts/
          git commit -m "🤖 Draft: 자동 생성 초안 ${DATE}"
          git push origin "$BRANCH"

          gh pr create \
            --title "📝 [검수 필요] 자동 생성 초안 ${DATE}" \
            --body "## 검수 체크리스트
          - [ ] 사실 확인 (링크 및 날짜 검증)
          - [ ] 제목 및 메타 디스크립션 검토
          - [ ] 코드 스니펫 정확성 확인
          - [ ] 어조 및 가독성 확인
          - [ ] blog/index.html 포스트 카드 추가

          검수 완료 후 blog/drafts/ → blog/posts/ 로 파일 이동하고 Merge 하세요." \
            --base main \
            --head "$BRANCH"
