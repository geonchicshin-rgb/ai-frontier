name: 블로그 초안 자동 생성

on:
  workflow_run:
    workflows: ["AI 인텔 일일 수집 + 블로그 자동 배포"]
    types: [completed]
  workflow_dispatch:
    inputs:
      topic:
        description: '토픽 (anthropic / karpathy / news / tools)'
        required: false
        default: 'anthropic'

jobs:
  generate-draft:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: pip install google-genai google-auth anthropic

      - name: GCP 서비스 계정 키 복원
        # GitHub Secret 'GCP_SA_KEY' = AI office/credentials/agent-office.json 의 base64 인코딩 값
        run: |
          echo "${{ secrets.GCP_SA_KEY }}" | base64 -d > /tmp/agent-office.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/agent-office.json" >> $GITHUB_ENV
          echo "GCP_PROJECT_ID=ai-transfer-center-495006"              >> $GITHUB_ENV
          echo "GCP_LOCATION=us-central1"                              >> $GITHUB_ENV
          echo "GEMINI_MODEL_NAME=gemini-2.5-flash"                    >> $GITHUB_ENV
          echo "CLAUDE_MODEL=claude-sonnet-4-6"                        >> $GITHUB_ENV

      - name: 블로그 초안 생성 (Gemini Stage1 + Claude Stage2)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          TOPIC="${{ github.event.inputs.topic || 'anthropic' }}"
          python -c "
          import sys, os
          sys.path.insert(0, '.harness')
          os.chdir('.')
          from main import HarnessOrchestrator
          o = HarnessOrchestrator(vault_path='.')
          result = o.execute_workflow('GENERATE_DRAFT', '$TOPIC')
          print('Result:', result)
          "

      - name: 생성된 초안으로 PR 생성
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +'%Y-%m-%d')
          BRANCH="draft/${DATE}-auto"

          git config user.name  "KNOT Draft Bot"
          git config user.email "bot@ai-frontier"

          # 변경사항이 없으면 종료
          git add blog/drafts/ 03_drafts/
          if git diff --cached --quiet; then
            echo "생성된 초안 없음 — 종료"
            exit 0
          fi

          git checkout -b "$BRANCH"
          git commit -m "🤖 Draft ${DATE}: Gemini(작가) + Claude(편집장) 자동 생성"
          git push origin "$BRANCH"

          gh pr create \
            --title "📝 [검수 필요] 블로그 초안 ${DATE}" \
            --body "## 검수 절차
          1. Obsidian에서 \`03_drafts/\` 폴더 확인 (30분 내 자동 동기화)
          2. VERIFY 항목 사실 확인
          3. \`blog/drafts/\` HTML 파일을 \`blog/posts/\`로 이동
          4. \`blog/index.html\` 포스트 카드 추가
          5. \`04_published/index.md\`에 발행 이력 기록
          6. PR Merge → Cloudflare 자동 배포

          **Stage 1:** Gemini 3.5 Flash (ai-transfer-center-495006)
          **Stage 2:** Claude Sonnet 4.6 (Anthropic)" \
            --base main \
            --head "$BRANCH"
